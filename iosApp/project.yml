name: Luna
options:
  bundleIdPrefix: com.luna
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
targets:
  Luna:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        type: group
    info:
      path: iosApp/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.luna.chat
      INFOPLIST_FILE: iosApp/Info.plist
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      FRAMEWORK_SEARCH_PATHS:
        - "$(SRCROOT)/../shared/build/bin/iosArm64/releaseFramework"
        - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
      OTHER_LDFLAGS:
        - "-framework"
        - "Shared"
      ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    preBuildScripts:
      - name: "Embed Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        inputFiles: []
        outputFiles: []

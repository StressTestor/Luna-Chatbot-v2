name: Build

on:
  push:
    branches: [master, 'claude/**']
  pull_request:
    branches: [master]

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3

      - name: Compile shared (Android)
        run: ./gradlew :shared:compileDebugKotlinAndroid --no-daemon --stacktrace --console=plain 2>&1 | tee -a build.log

      - name: Assemble app (debug)
        run: ./gradlew :composeApp:assembleDebug --no-daemon --stacktrace --console=plain 2>&1 | tee -a build.log

      - name: Surface failure to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('build.log', 'utf8'); } catch (e) { log = 'build.log not present'; }
            const lines = log.split('\n');
            const tail = lines.slice(-200).join('\n');
            const body = '## CI failure\n\n<details><summary>Last 200 lines of build output</summary>\n\n```\n' + tail + '\n```\n\n</details>';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
